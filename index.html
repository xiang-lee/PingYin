<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PingYin | 拼音冒险</title>
    <meta
      name="description"
      content="PingYin 是一个给孩子练习中文拼音、声调和朗读的小冒险站。"
    />
    <link rel="stylesheet" href="./styles.css?v=20260423c" />
  </head>
  <body>
    <div class="cloud cloud-a"></div>
    <div class="cloud cloud-b"></div>
    <div class="spark spark-a"></div>
    <div class="spark spark-b"></div>

    <main class="app-shell">
      <section class="splash panel" id="home-panel">
        <div class="brand-stack">
          <div class="brand-mascot">🦊</div>
          <div>
            <p class="brand-tag">PingYin</p>
            <h1>
              <span class="bilingual-stack title-stack">
                <span class="bilingual-pinyin">pīn yīn</span>
                <span class="bilingual-hanzi">拼音</span>
              </span>
            </h1>
            <div class="mini-icons" aria-hidden="true">
              <span>👂</span>
              <span>🧩</span>
              <span>🎤</span>
            </div>
          </div>
        </div>

        <div class="splash-actions">
          <button class="primary-btn splash-play" id="start-button">
            <span class="button-bilingual">
              <span class="button-tail">▶︎</span>
              <span class="bilingual-stack compact">
                <span class="bilingual-pinyin">kāi shǐ</span>
                <span class="bilingual-hanzi">开始</span>
              </span>
            </span>
          </button>
          <button class="ghost-btn icon-only" id="reset-progress-button" title="重置进度">↺</button>
        </div>

        <div class="status-strip" id="voice-strip"></div>
      </section>

      <section class="map panel" id="map-panel">
        <div class="map-head">
          <div>
            <p class="eyebrow">Play</p>
            <h2>选一关</h2>
          </div>
          <div class="score-pill" id="total-stars-pill">⭐ 0</div>
        </div>

        <div class="level-grid" id="level-grid"></div>
      </section>

      <section class="game panel hidden" id="game-panel">
        <div class="game-toolbar">
          <button class="ghost-btn icon-only" id="back-to-map-button" title="回地图">🗺</button>
          <div class="progress-dots" id="progress-dots"></div>
          <div class="score-pill" id="reward-chip">⭐ 0</div>
          <div class="mistake-chip" id="mistake-chip" aria-label="mistakes">🩵🩵🩵</div>
        </div>

        <div class="question-card" id="question-card">
          <div class="type-chip" id="question-type-chip"></div>
          <p class="prompt-copy" id="prompt-copy"></p>

          <div class="target-card" id="target-card"></div>

          <div class="action-row">
            <button class="secondary-btn action-btn" id="play-audio-button">
              <span class="button-bilingual">
                <span class="button-tail">🔊</span>
                <span class="bilingual-stack compact">
                  <span class="bilingual-pinyin">tīng yī tīng</span>
                  <span class="bilingual-hanzi">听一听</span>
                </span>
              </span>
            </button>
            <button class="primary-btn voice-btn" id="voice-button">
              <span class="button-bilingual">
                <span class="button-tail">🎤</span>
                <span class="bilingual-stack compact">
                  <span class="bilingual-pinyin">kāi shǐ dú</span>
                  <span class="bilingual-hanzi">开始读</span>
                </span>
              </span>
            </button>
          </div>

          <div class="feedback-box" id="feedback-box">点麦克风，读给我听</div>
          <div class="voice-log" id="voice-log">我会自动判断对不对</div>
        </div>
      </section>

      <section class="result panel hidden" id="result-panel">
        <div class="result-badge" id="result-badge">✨✨✨</div>
        <h2 id="result-title">
          <span class="bilingual-stack compact">
            <span class="bilingual-pinyin">hǎo</span>
            <span class="bilingual-hanzi">好</span>
          </span>
        </h2>
        <p class="result-copy" id="result-copy">继续</p>
        <div class="hero-actions">
          <button class="primary-btn" id="next-level-button">
            <span class="button-bilingual">
              <span class="bilingual-stack compact">
                <span class="bilingual-pinyin">xià yī guān</span>
                <span class="bilingual-hanzi">下一关</span>
              </span>
              <span class="button-tail">→</span>
            </span>
          </button>
          <button class="ghost-btn icon-only" id="result-map-button" title="回地图">🗺</button>
        </div>
      </section>
    </main>
    <script src="./app.js?v=20260423c"></script>
  </body>
</html>
